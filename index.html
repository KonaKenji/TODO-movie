<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOVIEFLIX</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header" id="header">
    <div class="header-left">
      <h1 class="logo">MOVIEFLIX</h1>
      <nav class="nav-links">
        <a href="#" class="nav-link active">홈</a>
      </nav>
    </div>
    <div class="header-right">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18">
          <path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="영화 제목으로 검색" autocomplete="off" />
        <button id="searchClear" class="search-clear" aria-label="검색 지우기" hidden>&times;</button>
      </div>
    </div>
  </header>

  <main id="mainContent">
    <section class="hero" id="hero">
      <div class="hero-backdrop" id="heroBackdrop"></div>
      <div class="hero-gradient"></div>
      <div class="hero-info">
        <h2 class="hero-title" id="heroTitle">불러오는 중...</h2>
        <p class="hero-overview" id="heroOverview"></p>
        <div class="hero-buttons">
          <button class="btn btn-detail" id="heroDetailBtn">상세보기</button>
        </div>
      </div>
    </section>

    <section id="rowsContainer" class="rows-container">
      <div class="movie-row" data-row="now_playing">
        <h3 class="row-title">현재 상영중</h3>
        <div class="row-track" id="row-now_playing"></div>
      </div>
      <div class="movie-row" data-row="popular">
        <h3 class="row-title">인기 영화</h3>
        <div class="row-track" id="row-popular"></div>
      </div>
      <div class="movie-row" data-row="top_rated">
        <h3 class="row-title">최고 평점</h3>
        <div class="row-track" id="row-top_rated"></div>
      </div>
      <div class="movie-row" data-row="upcoming">
        <h3 class="row-title">개봉 예정</h3>
        <div class="row-track" id="row-upcoming"></div>
      </div>
    </section>

    <section id="searchResults" class="search-results" hidden>
      <h3 class="row-title" id="searchResultsTitle">검색 결과</h3>
      <div class="grid" id="searchResultsGrid"></div>
      <p class="empty-message" id="searchEmptyMessage" hidden>검색 결과가 없습니다.</p>
    </section>
  </main>

  <footer class="footer">
    <p>이 사이트는 TMDB API를 사용하지만 TMDB의 승인 또는 인증을 받지 않았습니다.</p>
  </footer>

  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose" aria-label="닫기">&times;</button>
      <div class="modal-backdrop" id="modalBackdrop">
        <div class="modal-backdrop-gradient"></div>
      </div>
      <div class="modal-body">
        <h2 class="modal-title" id="modalTitle"></h2>
        <div class="modal-meta">
          <span class="modal-rating" id="modalRating"></span>
          <span class="modal-release" id="modalRelease"></span>
          <span class="modal-runtime" id="modalRuntime"></span>
        </div>
        <div class="modal-genres" id="modalGenres"></div>
        <p class="modal-overview" id="modalOverview"></p>
        <div class="modal-trailer" id="modalTrailer"></div>
      </div>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
